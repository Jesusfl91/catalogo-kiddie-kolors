      // --- Sub-componente: Admin Productos ---
      function AdminProducts({ products, categories, showMsg, config }) {
        const defaultProduct = { nombre: '', precio_mayor: 0, compra_minima_unidad: 1, categoria_id: '', disponible: true, fotos: ['', ''] };
        const [editing, setEditing] = useState(null);
        const [formData, setFormData] = useState(defaultProduct);
        const [isUploading, setIsUploading] = useState(false);
        const [productToDelete, setProductToDelete] = useState(null);

        // NUEVOS ESTADOS PARA ACTUALIZACIÓN MASIVA DE PRECIOS
        const [showPriceModal, setShowPriceModal] = useState(false);
        const [priceConfig, setPriceConfig] = useState({ action: 'increase', percent: 0, onlyActive: true });
        const [isUpdatingPrices, setIsUpdatingPrices] = useState(false);

        const handleSave = async () => {
          if (!formData.nombre || formData.precio_mayor <= 0) return showMsg('Datos inválidos', 'error');
          try {
            const cleanData = { ...formData, fotos: formData.fotos.filter(f => f && f.trim() !== '') };
            if (formData.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productos', formData.id), cleanData);
            else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'productos'), cleanData);
            showMsg(formData.id ? 'Producto actualizado' : 'Producto creado'); setEditing(null);
          } catch (e) { showMsg('Error al guardar', 'error'); }
        };

        const confirmAndDelete = async () => {
          if(!productToDelete) return;
          try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productos', productToDelete)); showMsg('Producto eliminado'); } 
          catch (e) { showMsg('Error al eliminar', 'error'); } finally { setProductToDelete(null); }
        };

        // NUEVA FUNCIÓN: ACTUALIZAR PRECIOS EN LOTE
        const handleBatchPriceUpdate = async () => {
          if (priceConfig.percent <= 0) return showMsg('El porcentaje debe ser mayor a 0', 'error');

          setIsUpdatingPrices(true);
          try {
            let batchCount = 0; 
            let batch = writeBatch(db);
            const factor = priceConfig.action === 'increase' ? (1 + (priceConfig.percent / 100)) : (1 - (priceConfig.percent / 100));
            const toUpdate = priceConfig.onlyActive ? products.filter(p => p.disponible) : products;

            for (const p of toUpdate) {
              const newPrice = Number((p.precio_mayor * factor).toFixed(2));
              batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'productos', p.id), { precio_mayor: newPrice });
              batchCount++;
              
              // Evitar error de límite de 500 escrituras en Firebase
              if (batchCount === 490) { await batch.commit(); batch = writeBatch(db); batchCount = 0; }
            }
            if (batchCount > 0) await batch.commit();
            
            showMsg(`Se actualizaron los precios de ${toUpdate.length} productos exitosamente.`);
            setShowPriceModal(false);
            setPriceConfig({ action: 'increase', percent: 0, onlyActive: true });
          } catch (e) {
            showMsg('Error actualizando precios', 'error');
            console.error(e);
          } finally {
            setIsUpdatingPrices(false);
          }
        };

        if (editing) {
          return (
            <div className="animate-in fade-in slide-in-from-right-4">
              <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-4">
                <h3 className="text-2xl font-black uppercase title-font">{formData.id ? 'Editar Producto' : 'Nuevo Producto'}</h3>
                <button onClick={() => setEditing(null)} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><X size={24}/></button>
              </div>
              
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div className="space-y-2">
                  <Input label="Nombre del Producto" value={formData.nombre} onChange={e=>setFormData({...formData, nombre: e.target.value})} />
                  <div className="flex gap-4">
                    <div className="flex-1"><Input label="Precio ($)" type="number" min="0" value={formData.precio_mayor} onChange={e=>setFormData({...formData, precio_mayor: Number(e.target.value)})} /></div>
                    <div className="flex-1"><Input label="Compra Min (Unids)" type="number" min="1" value={formData.compra_minima_unidad} onChange={e=>setFormData({...formData, compra_minima_unidad: Number(e.target.value)})} /></div>
                  </div>
                  <div className="mb-6">
                    <label className="block text-[11px] font-bold text-gray-500 mb-2 uppercase tracking-wider">Categoría</label>
                    <select value={formData.categoria_id} onChange={e=>setFormData({...formData, categoria_id: e.target.value})} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:outline-none transition-all text-sm font-semibold">
                      <option value="">Seleccionar...</option>
                      {categories.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}
                    </select>
                  </div>
                  <div className="p-4 bg-gray-50 rounded-xl border border-gray-200 flex items-center gap-3">
                    <input type="checkbox" id="disp" checked={formData.disponible} onChange={e=>setFormData({...formData, disponible: e.target.checked})} className="w-5 h-5 rounded border-gray-300 text-green-600 focus:ring-green-500" />
                    <label htmlFor="disp" className="font-bold text-sm text-gray-800 uppercase tracking-wide cursor-pointer">Activo en Tienda</label>
                  </div>
                </div>

                <div>
                  <label className="block text-[11px] font-bold text-gray-500 mb-2 uppercase tracking-wider">Fotografías del Producto (Hasta 2)</label>
                  <div className="grid grid-cols-2 gap-4">
                    {[0, 1].map((index) => (
                      <div key={index} className="relative group">
                        <input type="file" accept="image/*" onChange={async (e)=>{
                          const file = e.target.files[0]; if(!file) return; setIsUploading(true);
                          try {
                            const base64Url = await compressImage(file, 800);
                            const newFotos = [...(formData.fotos || [])]; newFotos[index] = base64Url;
                            if (index === 1 && !newFotos[0]) newFotos[0] = '';
                            setFormData({...formData, fotos: newFotos}); showMsg(`Foto ${index + 1} procesada exitosamente`);
                          } catch (err) { showMsg('Error procesando foto', 'error'); } finally { setIsUploading(false); }
                        }} className="hidden" id={`upload-prod-${index}`} disabled={isUploading}/>
                        <label htmlFor={`upload-prod-${index}`} className={`flex flex-col items-center justify-center w-full aspect-square border-2 border-dashed rounded-2xl cursor-pointer transition-all ${formData.fotos && formData.fotos[index] ? 'border-gray-200 bg-gray-50' : 'border-blue-300 bg-blue-50 hover:bg-blue-100'} ${isUploading ? 'opacity-50 pointer-events-none' : ''}`}>
                          {formData.fotos && formData.fotos[index] ? (
                            <div className="relative w-full h-full p-2">
                              <img src={formData.fotos[index]} alt={`Preview ${index}`} className="w-full h-full object-contain" />
                              <button onClick={(e) => { e.preventDefault(); const newFotos = [...formData.fotos]; newFotos[index] = ''; setFormData({...formData, fotos: newFotos}); }} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600 shadow-md" title="Eliminar foto"><X size={12} /></button>
                            </div>
                          ) : (
                            <div className="text-center p-4"><ImageIcon className="w-8 h-8 mb-2 mx-auto text-blue-400" /><span className="text-[10px] font-bold text-blue-600 uppercase">Subir Foto {index + 1}</span></div>
                          )}
                        </label>
                        <Input type="text" value={formData.fotos && formData.fotos[index] ? formData.fotos[index] : ''} onChange={e => { const newFotos = [...(formData.fotos || [])]; newFotos[index] = e.target.value; setFormData({...formData, fotos: newFotos}); }} placeholder="Enlace web (Opcional)" className="mt-3 mb-0" />
                      </div>
                    ))}
                  </div>
                  {isUploading && <div className="mt-4 text-center font-bold text-blue-600 text-sm animate-pulse">Comprimiendo imagen...</div>}
                </div>
              </div>
              
              <div className="pt-8 mt-6 border-t border-gray-100 flex gap-4">
                <Button onClick={handleSave} className="flex-grow md:flex-grow-0 md:w-64" style={{ backgroundColor: config.color_primario }} disabled={isUploading}>Guardar Producto</Button>
                <Button variant="secondary" onClick={() => setEditing(null)}>Cancelar</Button>
              </div>
            </div>
          );
        }

        return (
          <div className="animate-in fade-in">
            <ConfirmModal isOpen={!!productToDelete} title="¿Eliminar Producto?" message="Esta acción no se puede deshacer. El producto desaparecerá permanentemente." onConfirm={confirmAndDelete} onCancel={() => setProductToDelete(null)} confirmText="Sí, Eliminar" />
            
            {/* MODAL AJUSTE DE PRECIOS MASIVO */}
            {showPriceModal && (
              <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[110] px-4 animate-in fade-in">
                <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl animate-in zoom-in-95">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-xl font-black uppercase tracking-wide title-font flex items-center gap-2"><TrendingUp size={20} className="text-blue-500"/> Ajuste Masivo</h3>
                    <button onClick={() => setShowPriceModal(false)} className="text-gray-400 hover:text-gray-900 transition-colors bg-gray-100 hover:bg-gray-200 p-2 rounded-full"><X size={20} /></button>
                  </div>
                  
                  <div className="space-y-4 mb-6">
                    <div>
                      <label className="block text-[11px] font-bold text-gray-500 mb-2 uppercase tracking-wider">Acción</label>
                      <div className="flex gap-2">
                        <button onClick={() => setPriceConfig({...priceConfig, action: 'increase'})} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${priceConfig.action === 'increase' ? 'bg-green-100 text-green-700 border-2 border-green-500' : 'bg-gray-50 text-gray-500 border-2 border-transparent hover:bg-gray-100'}`}>Aumentar (+)</button>
                        <button onClick={() => setPriceConfig({...priceConfig, action: 'decrease'})} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${priceConfig.action === 'decrease' ? 'bg-red-100 text-red-700 border-2 border-red-500' : 'bg-gray-50 text-gray-500 border-2 border-transparent hover:bg-gray-100'}`}>Reducir (-)</button>
                      </div>
                    </div>

                    <div>
                      <label className="block text-[11px] font-bold text-gray-500 mb-2 uppercase tracking-wider">Porcentaje (%)</label>
                      <div className="relative">
                        <Percent size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" />
                        <input type="number" min="0" value={priceConfig.percent} onChange={e => setPriceConfig({...priceConfig, percent: Number(e.target.value)})} className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:outline-none transition-all focus:border-transparent text-sm font-black text-gray-800" />
                      </div>
                    </div>

                    <div className="p-4 bg-gray-50 rounded-xl border border-gray-200 flex items-center gap-3">
                      <input type="checkbox" id="onlyAct" checked={priceConfig.onlyActive} onChange={e=>setPriceConfig({...priceConfig, onlyActive: e.target.checked})} className="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                      <label htmlFor="onlyAct" className="font-bold text-sm text-gray-800 cursor-pointer">Afectar solo a productos activos</label>
                    </div>
                    
                    <div className="text-[11px] text-gray-500 bg-blue-50 p-3 rounded-xl border border-blue-100 font-medium leading-relaxed">
                      <strong className="text-blue-700 uppercase tracking-wider block mb-1">Cálculo de Ejemplo:</strong> 
                      Si un producto cuesta <strong className="text-gray-900">$10.00</strong> y aplicas un {priceConfig.action === 'increase' ? 'aumento' : 'descuento'} del <strong className="text-gray-900">{priceConfig.percent || 0}%</strong>, pasará a costar <strong className="text-gray-900">${(10 * (priceConfig.action === 'increase' ? (1 + priceConfig.percent / 100) : (1 - priceConfig.percent / 100))).toFixed(2)}</strong>.
                    </div>
                  </div>

                  <Button onClick={handleBatchPriceUpdate} className="w-full py-3.5" disabled={isUpdatingPrices || priceConfig.percent <= 0} style={{ backgroundColor: config.color_primario }}>
                    {isUpdatingPrices ? 'PROCESANDO...' : 'APLICAR CAMBIOS AHORA'}
                  </Button>
                </div>
              </div>
            )}

            <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">
              <div><h3 className="text-2xl font-black uppercase title-font tracking-wide">Inventario</h3><p className="text-sm text-gray-500 font-medium">{products.length} productos registrados</p></div>
              <div className="flex flex-wrap gap-3">
                <Button variant="secondary" onClick={() => setShowPriceModal(true)} className="py-2.5 px-4 text-sm bg-gray-100 hover:bg-gray-200 border-none shadow-sm"><TrendingUp size={16} className="mr-2 text-blue-600 hidden sm:inline"/> Ajuste Masivo</Button>
                <Button onClick={() => { setFormData(defaultProduct); setEditing(true); }} className="py-2.5 px-5 text-sm" style={{ backgroundColor: config.color_primario }}><Plus size={16} className="mr-1"/> Crear Producto</Button>

                        </td>
                        <td className="p-4 text-center">
                          <div className="flex justify-center gap-2">
                            <button onClick={() => { setFormData(p); setEditing(true); }} className="p-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-xl transition-colors"><Edit size={16}/></button>

      // --- Sub-componente: Admin Respaldo ---
      function AdminRespaldo({ config, categories, products, showMsg }) {
        const [isUploading, setIsUploading] = useState(false);
        const [pendingJSONFile, setPendingJSONFile] = useState(null); 
        const [isPrintingCatalog, setIsPrintingCatalog] = useState(false); // NUEVO ESTADO PARA PDF

        const exportFullJSON = () => {
          const backupData = { type: 'b2b-catalog-full-backup', timestamp: new Date().toISOString(), config: config, categories: categories, products: products };
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2));
          const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", `b2b_backup_total_${new Date().toISOString().split('T')[0]}.json`); dl.click();
          showMsg('Copia de seguridad del sistema completo descargada.');
        };

        const handleJSONSelect = (e) => {
          const file = e.target.files[0]; if (!file) return;
          setPendingJSONFile(file); e.target.value = ''; 
        };

        const executeImportFullJSON = () => {
          if (!pendingJSONFile) return;
          const file = pendingJSONFile; setPendingJSONFile(null); 
          
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              setIsUploading(true);
              const data = JSON.parse(event.target.result);
              let batchCount = 0; let batch = writeBatch(db);
              const commitBatch = async () => { await batch.commit(); batch = writeBatch(db); batchCount = 0; };

              if (Array.isArray(data)) {
                for (const prod of data) {
                  const { id, ...prodData } = prod;
                  const ref = id ? doc(db, 'artifacts', appId, 'public', 'data', 'productos', id) : doc(collection(db, 'artifacts', appId, 'public', 'data', 'productos'));
                  batch.set(ref, prodData); batchCount++; if (batchCount > 490) await commitBatch();
                }
                if (batchCount > 0) await commitBatch(); showMsg('¡Restauración exitosa! Se cargaron los productos.'); return;
              }

              if (data.type !== 'b2b-catalog-full-backup' && !data.config) throw new Error("El archivo no es válido.");

              if (data.config) { batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), data.config, { merge: true }); batchCount++; }
              
              if (data.categories && Array.isArray(data.categories)) {
                for (const cat of data.categories) {
                  const { id, ...catData } = cat;
                  const ref = id ? doc(db, 'artifacts', appId, 'public', 'data', 'categorias', id) : doc(collection(db, 'artifacts', appId, 'public', 'data', 'categorias'));
                  batch.set(ref, catData); batchCount++; if (batchCount > 490) await commitBatch();
                }
              }

              if (data.products && Array.isArray(data.products)) {
                for (const prod of data.products) {
                  const { id, ...prodData } = prod;
                  const ref = id ? doc(db, 'artifacts', appId, 'public', 'data', 'productos', id) : doc(collection(db, 'artifacts', appId, 'public', 'data', 'productos'));
                  batch.set(ref, prodData); batchCount++; if (batchCount > 490) await commitBatch();
                }
              }

              if (batchCount > 0) await commitBatch(); showMsg('¡Restauración exitosa! La tienda ha cargado el respaldo.');
            } catch (err) { showMsg('Error al restaurar JSON. Archivo inválido o corrupto.', 'error'); } finally { setIsUploading(false); }
          };
          reader.readAsText(file);
        };

        const exportToCSV = () => {
          const headers = ['nombre', 'precio_mayor', 'compra_minima_unidad', 'categoria_id', 'disponible', 'foto1'];
          let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\r\n";
          products.forEach(p => { csvContent += [`"${p.nombre.replace(/"/g, '""')}"`, p.precio_mayor, p.compra_minima_unidad, p.categoria_id, p.disponible, p.fotos?.[0] ? `"${p.fotos[0]}"` : ''].join(",") + "\r\n"; });
          const dl = document.createElement('a'); dl.setAttribute("href", encodeURI(csvContent)); dl.setAttribute("download", `productos_plantilla_${new Date().getTime()}.csv`); dl.click();
          showMsg('Catálogo exportado en CSV/Excel exitosamente');
        };

        const importCSV = (e) => {
          const file = e.target.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              setIsUploading(true);
              const rows = event.target.result.split('\n').filter(r => r.trim() !== '');
              let batchCount = 0; let batch = writeBatch(db);
              
              for (let i = 1; i < rows.length; i++) {
                const values = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                if(values.length < 2) continue;
                batch.set(doc(collection(db, 'artifacts', appId, 'public', 'data', 'productos')), {
                  nombre: values[0] || 'Sin nombre', precio_mayor: Number(values[1]) || 0, compra_minima_unidad: Number(values[2]) || 1,
                  categoria_id: values[3] || '', disponible: values[4] === 'true' || values[4] === '1', fotos: values[5] ? [values[5]] : []
                });
                batchCount++; if (batchCount === 490) { await batch.commit(); batch = writeBatch(db); batchCount = 0; }
              }
              if (batchCount > 0) await commitBatch(); showMsg(`Se importaron ${batchCount} productos exitosamente.`);
            } catch (err) { showMsg('Error importando CSV. Verifica el formato.', 'error'); } finally { setIsUploading(false); e.target.value = ''; }
          };
          reader.readAsText(file);
        };

        // NUEVA FUNCIÓN: GENERAR VISTA DE PDF Y LLAMAR A GUARDAR
        const printCatalog = () => {
          setIsPrintingCatalog(true);
          // Le damos medio segundo al navegador para que dibuje las imágenes antes de capturarlo
          setTimeout(() => {
            window.print();
            setIsPrintingCatalog(false);
          }, 500);
        };

        return (
          <div className="animate-in fade-in">
            <ConfirmModal isOpen={!!pendingJSONFile} title="⚠️ ADVERTENCIA" message="Esta acción sobreescribirá la apariencia, categorías y productos actuales. ¿Estás seguro de querer restaurar esta copia?" onConfirm={executeImportFullJSON} onCancel={() => setPendingJSONFile(null)} confirmText="Sí, Restaurar" />
            <div className="border-b border-gray-100 pb-4 mb-8"><h3 className="text-2xl font-black uppercase title-font tracking-wide">Respaldo y Datos</h3><p className="text-sm text-gray-500 font-medium">Protege la información de tu tienda o gestiona grandes cantidades de productos.</p></div>

            <h4 className="font-black text-gray-800 uppercase tracking-widest text-xs mb-4">Copia de Seguridad del Sistema (Recomendado)</h4>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
              <div className="bg-gradient-to-br from-gray-900 to-gray-800 rounded-3xl p-6 shadow-lg flex flex-col justify-between text-white group relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-2xl -mr-10 -mt-10"></div>
                <div><div className="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center mb-4 backdrop-blur-md"><Download size={24} className="text-white" /></div><h4 className="font-black text-lg title-font mb-1">Exportar JSON</h4><p className="text-sm text-gray-300 mb-6">Descarga un archivo completo con la apariencia, categorías y todos tus productos.</p></div>
                <button onClick={exportFullJSON} className="w-full py-3 bg-white text-gray-900 font-bold title-font rounded-xl hover:bg-gray-100 transition-colors shadow-md">Descargar Respaldo</button>
              </div>
              <div className="bg-white border-2 border-dashed border-gray-200 rounded-3xl p-6 flex flex-col justify-between hover:bg-gray-50 transition-colors">
                <div><div className="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center mb-4"><Upload size={24} className="text-blue-600" /></div><h4 className="font-black text-lg title-font mb-1 text-gray-800">Restaurar JSON</h4><p className="text-sm text-gray-500 mb-6">Sube un archivo de respaldo JSON previo. <strong className="text-red-500">Sobreescribirá tu tienda actual.</strong></p></div>
                <input type="file" id="import-json" accept=".json" className="hidden" onChange={handleJSONSelect} disabled={isUploading}/>
                <label htmlFor="import-json" className={`w-full py-3 bg-blue-600 text-white font-bold title-font rounded-xl cursor-pointer hover:bg-blue-700 transition-colors shadow-md text-center ${isUploading ? 'opacity-50 pointer-events-none' : ''}`}>{isUploading ? 'RESTAURANDO...' : 'SUBIR ARCHIVO JSON'}</label>
              </div>
            </div>

            <div className="w-full h-px bg-gray-100 my-8"></div>

            <h4 className="font-black text-gray-800 uppercase tracking-widest text-xs mb-4">Catálogo Visual y Datos Masivos</h4>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              
              {/* NUEVA TARJETA: DESCARGAR CATÁLOGO PDF */}
              <div className="bg-white rounded-3xl p-6 border border-gray-200 shadow-sm flex flex-col items-center gap-4 hover:border-red-300 transition-colors group cursor-pointer text-center" onClick={printCatalog}>
                <div className="w-14 h-14 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform"><FileText size={28} /></div>
                <div><h4 className="font-black text-base title-font text-gray-800">Catálogo PDF</h4><p className="text-xs text-gray-500 mt-1">Genera un PDF visual para clientes sin acceso a internet.</p></div>
              </div>

              <div className="bg-white rounded-3xl p-6 border border-gray-200 shadow-sm flex flex-col items-center gap-4 hover:border-green-300 transition-colors group cursor-pointer text-center" onClick={exportToCSV}>
                <div className="w-14 h-14 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform"><FileSpreadsheet size={28} /></div>
                <div><h4 className="font-black text-base title-font text-gray-800">Exportar a CSV</h4><p className="text-xs text-gray-500 mt-1">Baja solo tus productos para editarlos masivamente en Excel.</p></div>
              </div>

              <div className="bg-white rounded-3xl p-6 border border-gray-200 shadow-sm flex flex-col items-center gap-4 hover:border-blue-300 transition-colors group text-center">
                <div className="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform"><Upload size={28} /></div>
                <div className="flex-grow w-full"><h4 className="font-black text-base title-font text-gray-800">Importar CSV</h4><p className="text-xs text-gray-500 mt-1 mb-3">Carga cientos de productos a la vez.</p><input type="file" id="import-csv" accept=".csv" className="hidden" onChange={importCSV} disabled={isUploading}/><label htmlFor="import-csv" className={`w-full block text-xs font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-lg cursor-pointer hover:bg-blue-100 transition-colors ${isUploading ? 'opacity-50' : ''}`}>SELECCIONAR CSV</label></div>
              </div>
            </div>

            {/* DOM OCULTO: PLANTILLA DE DISEÑO PARA EL PDF DEL CATÁLOGO COMPLETO */}
            {isPrintingCatalog && (
              <div className="printable-section bg-white text-black p-8 min-h-screen z-[9999]">
                <div className="text-center mb-10 border-b-2 border-gray-100 pb-8">
                  {config.logo_url && <img src={config.logo_url} alt="Logo" className="h-20 mx-auto mb-4 object-contain" />}
                  <h1 className="text-3xl font-black uppercase title-font">{config.mensaje_bienvenida}</h1>
                  <p className="text-gray-500 font-bold mt-2">WhatsApp: +{config.whatsapp_numero.replace(/\D/g, '')}</p>
                </div>
                
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-6">
                  {products.filter(p => p.disponible).map(p => (
                    <div key={p.id} className="border border-gray-100 p-4 rounded-2xl flex flex-col items-center text-center" style={{ breakInside: 'avoid' }}>
                      {p.fotos?.[0] ? (
                        <img src={p.fotos[0]} className="w-32 h-32 object-contain mb-3 mix-blend-multiply" />
                      ) : (
                        <div className="w-32 h-32 bg-gray-50 flex items-center justify-center mb-3 rounded-xl"><ImageIcon className="text-gray-300" /></div>
                      )}
                      <h3 className="font-bold text-sm mb-1 leading-tight text-gray-800">{p.nombre}</h3>
                      <p className="text-[10px] text-gray-500 mb-2 uppercase font-bold tracking-wider">Mínimo: {p.compra_minima_unidad} u.</p>
                      <div className="font-black text-xl title-font" style={{ color: config.color_primario }}>${Number(p.precio_mayor).toFixed(2)}</div>
                    </div>
                  ))}
                </div>
                
                <div className="mt-12 text-center text-xs text-gray-400 font-bold uppercase tracking-widest border-t border-gray-100 pt-6">
                  Catálogo generado automáticamente el {new Date().toLocaleDateString()}
                </div>
              </div>
            )}
          </div>
        );
      }

      // INICIA LA APLICACIÓN
      const root = createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
