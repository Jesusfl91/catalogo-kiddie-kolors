    <!-- NUEVO: Generador de Imágenes para descargar el Ticket como PNG -->

    <!-- Import Maps: Le dice al navegador de dónde sacar las librerías -->

      {

</head>
<body class="font-futura text-gray-800">
    <div id="root"></div>

    <!-- EL CÓDIGO DE TU APLICACIÓN -->
    <script type="text/babel" data-type="module">
      import React, { useState, useEffect, useMemo } from 'react';
      import { createRoot } from 'react-dom/client';
      import { 
        ShoppingCart, Search, Menu, X, Plus, Minus, Trash2, Edit, 
        Image as ImageIcon, Save, LogIn, ChevronRight, ChevronLeft, Check, Copy,
        Download, Upload, FileJson, FileSpreadsheet, AlertTriangle, LogOut, ChevronDown, Package, Clock, CheckCircle, FileText, TrendingUp, Percent
      } from 'lucide-react';
      import { initializeApp } from 'firebase/app';
      import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
      import { 
        getFirestore, collection, doc, setDoc, onSnapshot, addDoc, 
        updateDoc, deleteDoc, getDoc, writeBatch 
      } from 'firebase/firestore';

      // ============================================================================
      // CONFIGURACIÓN DE FIREBASE (Kiddie Kolors)
      // ============================================================================
      const firebaseConfig = {
        apiKey: "AIzaSyDbP9Klaf2YQ9x1mTgkRDbQ2jI1mH-Ntb4",
        authDomain: "catalogo-kiddie-kolors.firebaseapp.com",
        projectId: "catalogo-kiddie-kolors",
        storageBucket: "catalogo-kiddie-kolors.firebasestorage.app",
        messagingSenderId: "724589025495",
        appId: "1:724589025495:web:259dbd553512b846233892",
        measurementId: "G-DPY0WZJWBS"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const appId = 'catalogo-kiddie-kolors';

      // ============================================================================
      // UTILIDAD: CONVERSOR Y COMPRESOR DE IMÁGENES
      // ============================================================================
      const compressImage = (file, maxWidth = 800) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let width = img.width;
              let height = img.height;
              if (width > height) {
                if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
              } else {
                if (height > maxWidth) { width = Math.round((width * maxWidth) / height); height = maxWidth; }
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/webp', 0.8)); 
            };
            img.onerror = error => reject(error);
          };
          reader.onerror = error => reject(error);
        });
      };

      // ============================================================================
      // COMPONENTES DE UI REUTILIZABLES
      // ============================================================================
      const Button = ({ children, onClick, variant = 'primary', className = '', style = {}, disabled = false, type = "button" }) => {
        const baseClass = "px-6 py-2.5 rounded-xl font-bold title-font transition-all duration-300 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.98]";
        const variants = {
          primary: "bg-red-600 text-white hover:bg-red-700 shadow-[0_4px_14px_0_rgba(220,38,38,0.39)] hover:shadow-[0_6px_20px_rgba(220,38,38,0.23)]",
          secondary: "bg-gray-100 text-gray-800 hover:bg-gray-200 border border-gray-200",
          danger: "bg-red-50 text-red-600 hover:bg-red-100",
          outline: "border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50",
          outlinePrimary: "border-2 border-red-600 text-red-600 hover:bg-red-50"
        };
        return (
          <button 
            type={type} onClick={onClick} className={`${baseClass} ${variants[variant]} ${className}`}
            style={variant === 'primary' && style.backgroundColor ? { ...style, boxShadow: `0 4px 14px 0 ${style.backgroundColor}60` } : variant === 'outlinePrimary' && style.color ? { borderColor: style.color, color: style.color } : style}
            disabled={disabled}
          >
            {children}
          </button>
        );
      };

      const Input = ({ label, type = 'text', name, value, onChange, placeholder, required = false, min, className = '', disabled = false }) => (
        <div className={`mb-5 ${className}`}>
          {label && <label className="block text-[11px] font-bold text-gray-500 mb-2 uppercase tracking-wider">{label} {required && <span className="text-red-500">*</span>}</label>}
          <input
            type={type} name={name} value={value} onChange={onChange} placeholder={placeholder} required={required} min={min} disabled={disabled}
            className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:outline-none transition-all focus:border-transparent text-sm text-gray-800 disabled:opacity-60"
          />
        </div>
      );

      const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "Confirmar" }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[110] px-4 animate-in fade-in">
            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl animate-in zoom-in-95">
              <h3 className="text-xl font-black text-red-600 mb-3 uppercase tracking-wide title-font">{title}</h3>
              <p className="text-gray-600 mb-6 text-sm font-medium">{message}</p>
              <div className="flex gap-3">
                <Button onClick={onCancel} variant="secondary" className="flex-1 py-3 text-xs">Cancelar</Button>
                <Button onClick={onConfirm} variant="danger" className="flex-1 py-3 text-xs">{confirmText}</Button>
              </div>
            </div>
          </div>
        );
      };

      // ============================================================================
      // COMPONENTE PRINCIPAL (APP)
      // ============================================================================
      function App() {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [isConfigLoaded, setIsConfigLoaded] = useState(false); // NUEVO ESTADO PARA ESPERAR LA APARIENCIA
        const [view, setView] = useState('catalog'); 
        const [isCartOpen, setIsCartOpen] = useState(false); 
        
        const [isAdminAuth, setIsAdminAuth] = useState(() => sessionStorage.getItem('adminAuth') === 'true');
        const [showLoginModal, setShowLoginModal] = useState(false);
        const [loginPassword, setLoginPassword] = useState('');
        const [loginError, setLoginError] = useState('');
        const [showRecoveryInfo, setShowRecoveryInfo] = useState(false); 

        // ESTADOS PARA LA MEMORIA DEL NAVEGADOR (SEGUIMIENTO)
        const [lastOrderId, setLastOrderId] = useState(() => localStorage.getItem('kiddie_last_order'));
        const [lastOrder, setLastOrder] = useState(null);
        const [showLastOrder, setShowLastOrder] = useState(false);
        const [isDownloadingTracking, setIsDownloadingTracking] = useState(false); // ESTADO DE DESCARGA

        // SE AGREGA EL CAMPO "admin_email" y "datos_pago" A LA CONFIGURACIÓN INICIAL
        const [config, setConfig] = useState({
          banner_url: '', 
          logo_url: '', 
          color_primario: '#2563eb',
          whatsapp_numero: '1234567890',
          admin_email: '', 
          mensaje_bienvenida: 'KIDDIE KOLORS',
          monto_minimo: 100,
          admin_password: 'admin123',
          datos_pago: '💳 Transferencia Bancaria:\nBanco: Ejemplo\nCuenta: 0000-0000-0000\n\n📲 Zelle:\npagos@kiddiekolors.com'
        });
        
        const [categories, setCategories] = useState([]);
        const [products, setProducts] = useState([]);
        const [cart, setCart] = useState([]);
        const [pedidos, setPedidos] = useState([]);
        const [activeCategory, setActiveCategory] = useState('all');

        // EFECTO: INYECTAR FAVICON Y TÍTULO DINÁMICO
        useEffect(() => {
          if (config.logo_url) {
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
              link = document.createElement('link');
              link.rel = 'icon';
              document.head.appendChild(link);
            }
            link.href = config.logo_url;
          }
          if (config.mensaje_bienvenida) {
            document.title = config.mensaje_bienvenida;
          }
        }, [config.logo_url, config.mensaje_bienvenida]);

        useEffect(() => {
          const initAuth = async () => {
            try { await signInAnonymously(auth); } catch (error) { console.error("Auth error:", error); }
          };
          initAuth();

          // DETECTOR DE ENLACE SECRETO (PUERTA TRASERA)
          if (window.location.hash === '#kiddieadmin') {
            setShowLoginModal(true);
            // Limpia la URL para que no se quede a la vista
            window.history.replaceState(null, '', window.location.pathname);
          }

          const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
            setUser(currentUser);
            if (!currentUser) setLoading(false);
          });
          return () => unsubscribe();
        }, []);

        useEffect(() => {
          if (!user) return;
          const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
          const categoriesRef = collection(db, 'artifacts', appId, 'public', 'data', 'categorias');
          const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'productos');
          const pedidosRef = collection(db, 'artifacts', appId, 'public', 'data', 'pedidos');
          const cartRef = collection(db, 'artifacts', appId, 'users', user.uid, 'carrito');

          const unsubConfig = onSnapshot(configRef, (docSnap) => {
            if (docSnap.exists()) setConfig(docSnap.data());
            else setDoc(configRef, config).catch(console.error);
            setIsConfigLoaded(true); // CONFIRMAMOS QUE LA APARIENCIA CARGÓ
          }, console.error);

          const unsubCategories = onSnapshot(categoriesRef, (snapshot) => {
            const cats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setCategories(cats.sort((a, b) => a.orden - b.orden));
          }, console.error);

          const unsubProducts = onSnapshot(productsRef, (snapshot) => {
            setProducts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            setLoading(false);
          }, console.error);

          const unsubCart = onSnapshot(cartRef, (snapshot) => {
            setCart(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          }, console.error);

          const unsubPedidos = onSnapshot(pedidosRef, (snapshot) => {
            const peds = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setPedidos(peds.sort((a, b) => b.fecha - a.fecha));
          }, console.error);

          // DETECTAR EN TIEMPO REAL EL ÚLTIMO PEDIDO DEL CLIENTE
          let unsubLastOrder = () => {};
          if (lastOrderId) {
            const lastOrderRef = doc(db, 'artifacts', appId, 'public', 'data', 'pedidos', lastOrderId);
            unsubLastOrder = onSnapshot(lastOrderRef, (docSnap) => {
              if (docSnap.exists()) setLastOrder({ id: docSnap.id, ...docSnap.data() });
              else { setLastOrder(null); localStorage.removeItem('kiddie_last_order'); }
            }, console.error);
          }

          return () => { unsubConfig(); unsubCategories(); unsubProducts(); unsubCart(); unsubPedidos(); unsubLastOrder(); };
        }, [user, lastOrderId]);

        const addToCart = async (product, quantity) => {
          if (!user) return;
          const cartItem = cart.find(item => item.productId === product.id);
          const cartRef = collection(db, 'artifacts', appId, 'users', user.uid, 'carrito');
          try {
            if (cartItem) await updateDoc(doc(cartRef, cartItem.id), { quantity: cartItem.quantity + quantity });
            else await addDoc(cartRef, { productId: product.id, product: product, quantity: quantity });
          } catch (error) { console.error("Error al añadir:", error); }
        };

        const updateCartQuantity = async (cartItemId, newQuantity, minQuantity) => {
          if (!user || newQuantity < minQuantity) return;
          try { await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'carrito', cartItemId), { quantity: newQuantity }); } 
          catch (error) { console.error("Error actualizando:", error); }
        };

        const removeFromCart = async (cartItemId) => {
          if (!user) return;
          try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'carrito', cartItemId)); } 
          catch (error) { console.error("Error eliminando:", error); }
        };

        const createOrder = async (orderData) => {
          if (!user) return null;
          try {
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pedidos'), {
              ...orderData, fecha: Date.now(), estado: 'Pendiente', userId: user.uid
            });
            const cartRef = collection(db, 'artifacts', appId, 'users', user.uid, 'carrito');
            await Promise.all(cart.map(item => deleteDoc(doc(cartRef, item.id))));
            
            // GUARDAR EN LA MEMORIA DEL NAVEGADOR
            localStorage.setItem('kiddie_last_order', docRef.id);
            setLastOrderId(docRef.id);

            return docRef.id; 
          } catch (e) {
            console.error("Error creando pedido:", e);
            return null;
          }
        };

        const cartTotal = useMemo(() => cart.reduce((total, item) => total + (item.product.precio_mayor * item.quantity), 0), [cart]);

        const handleAdminClick = () => {
          if (isAdminAuth) setView('admin');
          else { setShowLoginModal(true); setLoginError(''); setLoginPassword(''); }
        };

        const handleLoginSubmit = (e) => {
          e.preventDefault();
          if (loginPassword === config.admin_password) {
            setIsAdminAuth(true); sessionStorage.setItem('adminAuth', 'true');
            setShowLoginModal(false); setView('admin');
          } else { setLoginError('Contraseña incorrecta'); }
        };

        const handleLogout = () => {
          setIsAdminAuth(false); sessionStorage.removeItem('adminAuth'); setView('catalog');
        };

        // NUEVA FUNCIÓN: Descargar el Ticket de Seguimiento como Imagen
        const downloadTrackingTicket = async () => {
          setIsDownloadingTracking(true);
          try {
            const element = document.getElementById('ticket-tracking');
            const canvas = await window.html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `Seguimiento_KiddieKolors_${lastOrder.id.slice(-6).toUpperCase()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            // Mostrar texto de éxito temporal
            setTimeout(() => setIsDownloadingTracking(false), 2000);
          } catch (e) {
            console.error("Error al generar la imagen", e);
            setIsDownloadingTracking(false);
          }
        };

        // PANTALLA DE CARGA ANIMADA Y PROTEGIDA
        if (loading || !isConfigLoaded) return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-[#fafafa]">
            <div className="relative flex items-center justify-center">
              {config.logo_url && (
                <img src={config.logo_url} alt="Logo" className="absolute h-10 md:h-14 object-contain z-10 animate-pulse drop-shadow-md" />
              )}
              {/* Anillo giratorio con el color de la marca (azul por defecto hasta que cargue) */}
              <div className="animate-spin rounded-full h-24 w-24 md:h-32 md:w-32 border-t-4 border-b-4 border-gray-200" style={{ borderTopColor: config.color_primario }}></div>
            </div>
            <p className="mt-8 text-xs md:text-sm font-black text-gray-400 uppercase tracking-widest animate-pulse title-font">Preparando Tienda...</p>
          </div>
        );

        return (
          <>
            <header className="bg-white/80 backdrop-blur-md border-b border-gray-100 text-xs flex justify-between px-6 py-3 text-gray-500 font-semibold tracking-wide sticky top-0 z-50 transition-all">
              <div className="flex items-center gap-4">
                <span className="uppercase">{config.mensaje_bienvenida}</span>
              </div>
              
              <div className="flex items-center gap-4">
                {isAdminAuth ? (
                  <div className="flex items-center gap-3">
                    <button onClick={() => setView('admin')} className={`hover:text-gray-900 flex items-center gap-1 transition-colors ${view==='admin'?'text-gray-900':'text-gray-500'}`}><Edit size={14} /> Panel</button>
                    <button onClick={handleLogout} className="hover:text-red-600 flex items-center gap-1 transition-colors text-gray-400"><LogOut size={14} /> Salir</button>
                  </div>
                ) : (
                  <div className="hidden"></div> // BOTÓN DE ADMIN ELIMINADO PARA LOS CLIENTES
                )}
              </div>
            </header>

            <main className={`${cart.length > 0 ? 'pb-28' : 'pb-12'}`}>
              {view === 'catalog' && <CatalogView config={config} categories={categories} products={products} activeCategory={activeCategory} setActiveCategory={setActiveCategory} addToCart={addToCart} cart={cart} updateCartQuantity={updateCartQuantity} />}
              {view === 'admin' && <AdminView config={config} categories={categories} products={products} pedidos={pedidos} setView={setView} />}
            </main>

            {/* BOTÓN FLOTANTE: MI PEDIDO (SEGUIMIENTO PARA CLIENTES) */}
            {lastOrder && view === 'catalog' && (
              <button 
                onClick={() => setShowLastOrder(true)} 
                className={`fixed right-4 sm:right-6 z-40 bg-blue-600 text-white p-4 rounded-full shadow-[0_8px_30px_rgb(37,99,235,0.4)] hover:scale-110 transition-all flex items-center justify-center animate-bounce group ${cart.length > 0 ? 'bottom-[100px]' : 'bottom-6'}`}
              >
                <Package size={28} />
                <span className="absolute right-full mr-4 bg-gray-900 text-white text-xs font-bold px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-lg">
                  Ver mi último pedido
                </span>
              </button>
            )}

            {view === 'catalog' && cart.length > 0 && (
              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-4xl bg-white/90 backdrop-blur-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 rounded-2xl z-40 p-4 pt-5 flex justify-between items-center animate-in slide-in-from-bottom-10 overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-gray-200">
                  <div className="h-full transition-all duration-500 ease-out" style={{ width: `${Math.min((cartTotal / config.monto_minimo) * 100, 100)}%`, backgroundColor: cartTotal >= config.monto_minimo ? '#22c55e' : config.color_primario }}></div>
                </div>
                <div className="flex items-center gap-4 pl-2">
                  <span className="font-bold text-gray-500 hidden sm:inline text-sm">Mínimo: ${Number(config.monto_minimo).toFixed(2)} USD</span>
                </div>
                <div className="flex items-center gap-4">
                  <span className="font-black text-xl hidden sm:inline">${cartTotal.toFixed(2)}</span>
                  <Button onClick={() => setIsCartOpen(true)} className="px-8 py-3 text-sm tracking-wider uppercase" style={{ backgroundColor: config.color_primario }}>
                    Ver Pedido <span className="sm:hidden ml-2">- ${cartTotal.toFixed(2)}</span>
                  </Button>
                </div>
              </div>
            )}

            {isCartOpen && <CartDrawer config={config} cart={cart} cartTotal={cartTotal} updateCartQuantity={updateCartQuantity} removeFromCart={removeFromCart} onClose={() => setIsCartOpen(false)} createOrder={createOrder} />}

            {showLoginModal && (
              <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-[100] px-4 animate-in fade-in duration-200">
                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 animate-in zoom-in-95 duration-200">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-2xl font-black title-font text-gray-800">Acceso Admin</h3>
                    <button onClick={() => {setShowLoginModal(false); setShowRecoveryInfo(false);}} className="text-gray-400 hover:text-gray-900 transition-colors bg-gray-100 hover:bg-gray-200 p-2 rounded-full"><X size={20} /></button>
                  </div>
                  
                  {!showRecoveryInfo ? (
                    <form onSubmit={handleLoginSubmit}>
                      <Input label="Contraseña" type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} placeholder="••••••••" required />
                      {loginError && <p className="text-red-500 text-sm font-bold mb-4 -mt-2">{loginError}</p>}
                      <Button type="submit" className="w-full py-3.5 mb-4" style={{ backgroundColor: config.color_primario }}>Ingresar al Panel</Button>
                      
                      <button type="button" onClick={() => setShowRecoveryInfo(true)} className="w-full text-center text-xs font-bold text-gray-400 hover:text-gray-600 underline transition-colors">
                        ¿Olvidaste tu contraseña?
                      </button>
                    </form>
                  ) : (
                    <div className="bg-gray-50 border border-gray-200 rounded-xl p-5 text-sm text-gray-600 text-center animate-in fade-in">
                      <p className="font-bold text-gray-800 mb-3 uppercase tracking-wider text-xs">🔒 Recuperación Segura</p>
                      <p className="mb-5 text-xs leading-relaxed">
                        Por seguridad, la clave solo puede verla el dueño de la tienda.<br/><br/>
                        Ingresa a tu cuenta de Firebase (<strong className="text-gray-800">console.firebase.google.com</strong>), entra a tu base de datos <strong>Firestore Database</strong> &gt; <strong>config</strong> &gt; <strong>main</strong> y revisa el campo "<strong className="text-gray-800">admin_password</strong>".
                      </p>
                      <Button onClick={() => setShowRecoveryInfo(false)} variant="secondary" className="w-full py-2.5 text-xs uppercase tracking-wider">Volver al login</Button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* MODAL DE SEGUIMIENTO DE PEDIDO (TICKET) */}
            {showLastOrder && lastOrder && (
              <div className="fixed inset-0 z-[100] flex justify-center bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300 p-4">
                <div className="w-full max-w-md bg-[#fafafa] h-full max-h-[90vh] my-auto rounded-3xl flex flex-col shadow-2xl animate-in zoom-in-95 duration-300 overflow-hidden relative">
                  <div className="flex justify-between items-center px-6 py-4 border-b border-gray-100 bg-white no-print">
                    <h2 className="text-lg font-black uppercase tracking-widest title-font flex items-center gap-2"><Package size={20} className="text-blue-500"/> Seguimiento</h2>
                    <button onClick={() => setShowLastOrder(false)} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><X size={20} /></button>
                  </div>
                  
                  {/* SE AÑADE EL ID "ticket-tracking" PARA CAPTURAR LA IMAGEN */}
                  <div id="ticket-tracking" className="flex-grow overflow-y-auto p-6 printable-section hide-scrollbar bg-white">
                    {config.logo_url && <img src={config.logo_url} alt="Logo" className="h-12 object-contain mb-6 mx-auto" />}
                    <div className="text-center mb-6">
                      <h3 className="font-black text-2xl title-font uppercase mb-1">Tu Pedido</h3>
                      <p className="text-gray-500 text-sm font-bold">ID: #{lastOrder.id.slice(-6).toUpperCase()}</p>
                      <div className={`mt-3 inline-block px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-wider border
                        ${lastOrder.estado === 'Pendiente' ? 'bg-yellow-50 text-yellow-600 border-yellow-200' : 
                          lastOrder.estado === 'Procesado' ? 'bg-blue-50 text-blue-600 border-blue-200' : 
                          lastOrder.estado === 'Completado' ? 'bg-green-50 text-green-600 border-green-200' : 
                          'bg-red-50 text-red-600 border-red-200'}`}>
                        Estado: {lastOrder.estado}
                      </div>
                    </div>

                    <div className="border-t border-b border-gray-100 py-4 mb-6">
                      <p className="text-sm font-bold text-gray-800 mb-1">{lastOrder.cliente?.firstName} {lastOrder.cliente?.lastName}</p>
                      <p className="text-xs text-gray-500 mb-1">{lastOrder.cliente?.phone} | {lastOrder.cliente?.email}</p>
                      <p className="text-xs text-gray-500">{lastOrder.cliente?.address}, {lastOrder.cliente?.city}</p>
                    </div>

                    <h4 className="font-black text-[11px] uppercase text-gray-400 tracking-widest mb-3">Resumen de Artículos</h4>
                    <div className="space-y-3 mb-6">
                      {lastOrder.items?.map((item, idx) => (
                        <div key={idx} className="flex justify-between text-sm">
                          <span className="font-medium text-gray-700">{item.cantidad}x {item.nombre}</span>
                          <span className="font-bold text-gray-900">${(item.cantidad * item.precio).toFixed(2)}</span>
                        </div>
                      ))}
                    </div>
                    
                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl mb-6">
                      <span className="font-bold text-gray-600 uppercase text-xs">Total a pagar</span>
                      <span className="font-black text-xl title-font" style={{ color: config.color_primario }}>${Number(lastOrder.total).toFixed(2)} USD</span>
                    </div>

                    {config.datos_pago && (
                      <div className="mt-6 p-5 border border-dashed border-gray-300 rounded-2xl bg-gray-50">
                        <h4 className="font-black text-xs uppercase tracking-widest text-gray-800 mb-3 flex items-center gap-2">💰 Instrucciones de Pago</h4>
                        <p className="text-xs text-gray-600 whitespace-pre-wrap leading-relaxed font-medium">{config.datos_pago}</p>
                      </div>
                    )}
                  </div>

                  <div className="p-4 bg-white border-t border-gray-100 no-print flex gap-3">
                    <Button onClick={downloadTrackingTicket} className={`flex-1 text-xs transition-colors ${isDownloadingTracking ? 'bg-green-100 text-green-700 border-green-200 hover:bg-green-100' : ''}`} variant="secondary" disabled={isDownloadingTracking}>
                      {isDownloadingTracking ? <Check size={16} className="mr-2 inline"/> : <Download size={16} className="mr-2 inline"/>} 
                      {isDownloadingTracking ? '¡Guardado!' : 'Guardar Imagen'}
                    </Button>
                    <Button onClick={() => {
                      const url = `https://api.whatsapp.com/send?phone=${config.whatsapp_numero.replace(/\D/g, '')}&text=${encodeURIComponent(`Hola, soy ${lastOrder.cliente?.firstName}, escribo para consultar el estado de mi pedido #${lastOrder.id.slice(-6).toUpperCase()}`)}`;
                      window.open(url, '_blank');
                    }} className="flex-1 text-xs" style={{ backgroundColor: '#25D366' }}><Package size={16} className="mr-2"/> Contactar</Button>
                  </div>
                </div>
              </div>
            )}
          </>
        );
      }

      // ============================================================================
      // VISTA: CATÁLOGO PRINCIPAL
      // ============================================================================
      function CatalogView({ config, categories, products, activeCategory, setActiveCategory, addToCart, cart, updateCartQuantity }) {
        const filteredProducts = activeCategory === 'all' ? products : products.filter(p => p.categoria_id === activeCategory);

        return (
          <div className="animate-in fade-in duration-300">
            <div className="w-full py-16 md:py-24 px-4 text-center relative overflow-hidden bg-gray-900">
              {config.banner_url ? <img src={config.banner_url} alt="Banner" className="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay" /> : <div className="absolute inset-0 w-full h-full opacity-95" style={{ backgroundColor: config.color_primario }}></div>}
              <div className="max-w-4xl mx-auto relative z-10 flex flex-col items-center drop-shadow-lg">
                {config.logo_url && <div className="bg-white/10 p-3 rounded-2xl backdrop-blur-md mb-6 border border-white/20 shadow-xl"><img src={config.logo_url} alt="Logo" className="h-14 md:h-20 object-contain" /></div>}
                <h2 className="text-4xl md:text-6xl font-black text-white mb-8 tracking-widest uppercase title-font">{config.mensaje_bienvenida}</h2>
                <div className="flex gap-10 text-white bg-black/20 p-4 rounded-2xl backdrop-blur-sm border border-white/10">
                  <div className="flex flex-col items-center px-4"><span className="text-3xl font-bold title-font">{products.length}</span><span className="text-xs font-bold uppercase opacity-80 tracking-wider">Productos</span></div>
                  <div className="w-px bg-white/20"></div>
                  <div className="flex flex-col items-center px-4"><span className="text-3xl font-bold title-font">USD</span><span className="text-xs font-bold uppercase opacity-80 tracking-wider">Moneda</span></div>
                </div>
              </div>
            </div>

            <div className="sticky top-[45px] z-30 bg-white/90 backdrop-blur-lg border-b border-gray-200 shadow-sm transition-all">
              <div className="max-w-7xl mx-auto px-4">
                <div className="flex overflow-x-auto gap-8 hide-scrollbar py-4">
                  <button onClick={() => setActiveCategory('all')} className={`whitespace-nowrap pb-1 text-sm font-black uppercase transition-all border-b-4 title-font tracking-wide ${activeCategory === 'all' ? 'text-gray-900 border-current' : 'text-gray-400 border-transparent hover:text-gray-600'}`} style={activeCategory === 'all' ? { borderColor: config.color_primario, color: config.color_primario } : {}}>TODOS</button>
                  {categories.map(cat => (
                    <button key={cat.id} onClick={() => setActiveCategory(cat.id)} className={`whitespace-nowrap pb-1 text-sm font-black uppercase transition-all border-b-4 title-font tracking-wide ${activeCategory === cat.id ? 'text-gray-900 border-current' : 'text-gray-400 border-transparent hover:text-gray-600'}`} style={activeCategory === cat.id ? { borderColor: config.color_primario, color: config.color_primario } : {}}>{cat.nombre}</button>
                  ))}
                </div>
              </div>
            </div>

            <div className="max-w-7xl mx-auto px-4 py-10">
              <div className="flex justify-between items-end mb-8">
                <p className="text-sm text-gray-500 font-bold uppercase tracking-wider">Mostrando {filteredProducts.length} productos</p>
              </div>
              {filteredProducts.length === 0 ? (
                <div className="text-center py-24 text-gray-400 bg-white rounded-3xl border border-gray-100 shadow-sm">
                  <Search className="w-16 h-16 mx-auto mb-4 text-gray-200" />
                  <p className="font-bold text-lg">No se encontraron productos.</p>
                </div>
              ) : (
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
                  {filteredProducts.map(product => {
                    const inCart = cart.find(i => i.productId === product.id);
                    return <ProductCard key={product.id} product={product} config={config} addToCart={addToCart} inCart={inCart} updateCartQuantity={updateCartQuantity} />;
                  })}
                </div>
              )}
            </div>
          </div>
        );
      }

      // ============================================================================
      // COMPONENTE: TARJETA DE PRODUCTO
      // ============================================================================
      function ProductCard({ product, config, addToCart, inCart, updateCartQuantity }) {
        const validImages = product.fotos?.filter(url => url && url.trim() !== '') || [];
        const images = validImages.length > 0 ? validImages : ['https://placehold.co/400x400?text=No+Image'];
        const [activeImage, setActiveImage] = useState(0);

        const handleScroll = (e) => {
          const scrollPosition = e.target.scrollLeft;
          const width = e.target.offsetWidth;
          setActiveImage(Math.round(scrollPosition / width));
        };

        return (
          <div className={`bg-white rounded-2xl p-4 shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col border border-gray-100 group ${!product.disponible ? 'opacity-60' : ''}`}>
            <div className="aspect-square bg-gray-50/50 rounded-xl mb-4 flex items-center justify-center relative overflow-hidden group-hover:bg-gray-100/50 transition-colors">
              <div className="flex w-full h-full overflow-x-auto snap-x snap-mandatory hide-scrollbar" onScroll={handleScroll}>
                {images.map((img, idx) => (
                  <div key={idx} className="w-full h-full flex-shrink-0 snap-center relative flex items-center justify-center">
                    <img src={img} alt={`${product.nombre} - ${idx}`} className="w-full h-full object-contain mix-blend-multiply p-3 group-hover:scale-105 transition-transform duration-500" />
                  </div>
                ))}
              </div>
              {images.length > 1 && (
                <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5 z-10 pointer-events-none">
                  {images.map((_, idx) => (
                    <div key={idx} className={`h-1.5 rounded-full transition-all ${activeImage === idx ? 'w-4 shadow-sm' : 'w-1.5 bg-gray-300'}`} style={activeImage === idx ? { backgroundColor: config.color_primario } : {}} />
                  ))}
                </div>
              )}
              {!product.disponible && (
                <div className="absolute inset-0 bg-white/70 flex items-center justify-center backdrop-blur-[2px] pointer-events-none">
                  <span className="bg-gray-900 text-white text-xs px-3 py-1.5 rounded-lg font-black tracking-widest title-font uppercase shadow-lg">Agotado</span>
                </div>
              )}
            </div>

            <div className="flex-grow flex flex-col">
              <h3 className="font-bold text-gray-700 text-sm line-clamp-2 leading-tight min-h-[2.5rem] mb-1">{product.nombre}</h3>
              <div className="mt-2 mb-4 flex justify-between items-end">
                <span className="font-black text-gray-900 text-xl title-font">${Number(product.precio_mayor).toFixed(2)}</span>
                <span className="text-[10px] font-bold text-gray-400 uppercase bg-gray-100 px-2 py-1 rounded-md">Mín {product.compra_minima_unidad} u.</span>
              </div>
              <div className="mt-auto">
                {inCart ? (
                  <div className="flex items-center justify-between border-2 rounded-xl p-1 bg-white shadow-sm" style={{ borderColor: config.color_primario }}>
                    <button onClick={() => updateCartQuantity(inCart.id, inCart.quantity - 1, product.compra_minima_unidad)} className="w-9 h-9 flex items-center justify-center text-gray-600 hover:bg-gray-100 disabled:opacity-30 rounded-lg transition-colors" disabled={inCart.quantity <= product.compra_minima_unidad}><Minus size={16} /></button>
                    <span className="font-black text-base title-font">{inCart.quantity}</span>
                    <button onClick={() => updateCartQuantity(inCart.id, inCart.quantity + 1, product.compra_minima_unidad)} className="w-9 h-9 flex items-center justify-center text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"><Plus size={16} /></button>
                  </div>
                ) : (
                  <Button onClick={() => addToCart(product, product.compra_minima_unidad)} className="w-full text-xs py-2.5 shadow-none hover:shadow-sm" variant="outlinePrimary" style={{ color: config.color_primario, borderColor: config.color_primario }} disabled={!product.disponible}>
                    + Añadir al pedido
                  </Button>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ============================================================================
      // COMPONENTE: DRAWER DEL CARRITO
      // ============================================================================
      function CartDrawer({ config, cart, cartTotal, updateCartQuantity, removeFromCart, onClose, createOrder }) {
        const minMet = cartTotal >= config.monto_minimo;
        const remaining = config.monto_minimo - cartTotal;
        const [checkoutStatus, setCheckoutStatus] = useState('idle'); 
        const [errorMessage, setErrorMessage] = useState('');
        const [waLink, setWaLink] = useState('');
        const [form, setForm] = useState({ firstName: '', lastName: '', phone: '', email: '', country: '', city: '', address: '', note: '' });
        
        // NUEVO ESTADO: Tomar una "foto" del carrito para la pantalla final y descargar imagen
        const [finalSnapshot, setFinalSnapshot] = useState({ items: [], total: 0 });
        const [savedOrderId, setSavedOrderId] = useState('');
        const [isDownloadingTicket, setIsDownloadingTicket] = useState(false);

        const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

        // NUEVA FUNCIÓN: Descargar el Ticket Recién Creado
        const downloadCheckoutTicket = async () => {
          setIsDownloadingTicket(true);
          try {
            const element = document.getElementById('ticket-checkout');
            const canvas = await window.html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `Pedido_KiddieKolors_${savedOrderId}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            // Mostrar éxito
            setTimeout(() => setIsDownloadingTicket(false), 2000);
          } catch (e) {
            console.error("Error al generar la imagen", e);
            setIsDownloadingTicket(false);
          }
        };

        const handleCheckout = async (e) => {
          if (e) e.preventDefault();
          if (!minMet || checkoutStatus === 'submitting') return;

          if (!form.firstName.trim() || !form.lastName.trim() || !form.phone.trim() || !form.email.trim() || !form.country.trim() || !form.city.trim() || !form.address.trim()) {
            setErrorMessage("Por favor, completa todos los campos del cliente marcados con asterisco (*).");
            setCheckoutStatus('error');
            const errorDiv = document.getElementById('checkout-error');
            if (errorDiv) errorDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
          }

          setCheckoutStatus('submitting');
          setErrorMessage('');
          
          // Tomar foto de los artículos antes de vaciar el carrito
          setFinalSnapshot({ items: [...cart], total: cartTotal });

          const orderData = {
            cliente: form, total: cartTotal,
            items: cart.map(item => ({ id: item.product.id, nombre: item.product.nombre, precio: item.product.precio_mayor, cantidad: item.quantity, foto: item.product.fotos?.[0] || '' }))
          };

          const orderIdFull = await createOrder(orderData);
          
          if (!orderIdFull) {
            setErrorMessage("Hubo un error al guardar el pedido. Verifica tu conexión e intenta de nuevo.");
            setCheckoutStatus('error'); return;
          }

          const shortOrderId = orderIdFull.slice(-6).toUpperCase();
          setSavedOrderId(shortOrderId); // Guardar ID para el nombre del archivo
          
          let text = `*NUEVO PEDIDO B2B*\n*ID de Pedido:* #${shortOrderId}\n\n*Cliente:* ${form.firstName} ${form.lastName}\n*Tel/WA:* ${form.phone}\n*Email:* ${form.email}\n*Ubicación:* ${form.city}, ${form.country}\n*Dirección:* ${form.address}\n`;
          if (form.note) text += `*Notas:* ${form.note}\n`;
          text += `\n*🛍️ DETALLE DE PRODUCTOS:*\n`;
          cart.forEach(item => { text += `▫️ ${item.quantity}x ${item.product.nombre} ($${item.product.precio_mayor.toFixed(2)}) -> *$${(item.quantity * item.product.precio_mayor).toFixed(2)}*\n`; });
          text += `\n*💰 TOTAL: $${cartTotal.toFixed(2)} USD*\n\nHe completado el registro en el catálogo. ¡Espero indicaciones para el pago!`;
          
          // --- NUEVO: SISTEMA DE NOTIFICACIÓN POR CORREO (FORMSUBMIT) ---
          if (config.admin_email && config.admin_email.includes('@')) {
            fetch(`https://formsubmit.co/ajax/${config.admin_email}`, {
              method: "POST",
              headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
              body: JSON.stringify({
                _subject: `🚀 NUEVO PEDIDO #${shortOrderId} - ${config.mensaje_bienvenida}`,
                _template: "box",
                Cliente: `${form.firstName} ${form.lastName}`,
                Telefono_WhatsApp: form.phone,
                Email_Cliente: form.email,
                Monto_Total: `$${cartTotal.toFixed(2)} USD`,
                Aviso: "Ingresa a tu panel de administrador para ver y gestionar los artículos exactos de este pedido."
              })
            }).catch(err => console.log("Error enviando notificación email:", err));
          }
          // --------------------------------------------------------------

          const cleanPhone = config.whatsapp_numero.replace(/\D/g, '');
          const url = `https://api.whatsapp.com/send?phone=${cleanPhone}&text=${encodeURIComponent(text)}`;
          
          setWaLink(url);
          setCheckoutStatus('success');

          try { window.open(url, '_blank'); } catch(err) { console.warn("Popup bloqueado", err); }
        };

        if (checkoutStatus === 'success') {
          return (
            <div className="fixed inset-0 z-50 flex justify-end bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300">
              <div className="w-full max-w-md bg-[#fafafa] h-full flex flex-col shadow-2xl animate-in slide-in-from-right-full duration-400 overflow-hidden">
                
                {/* ÁREA DEL TICKET DIGITAL CON ID "ticket-checkout" */}
                <div id="ticket-checkout" className="flex-grow overflow-y-auto p-6 md:p-8 printable-section bg-white hide-scrollbar">
                  <div className="text-center mb-8">
                    <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 no-print"><CheckCircle size={32} /></div>
                    {config.logo_url && <img src={config.logo_url} alt="Logo" className="h-12 object-contain mb-4 mx-auto hidden print:block" />}
                    <h2 className="text-2xl font-black title-font text-gray-900 uppercase">¡Gracias, {form.firstName}!</h2>
                    <p className="text-gray-500 font-medium text-sm mt-1">Hemos recibido tu pedido correctamente.</p>
                    
                    <div className="mt-4 inline-block px-4 py-2 rounded-lg bg-yellow-50 text-yellow-700 border border-yellow-200 text-xs font-black uppercase tracking-wider">
                      Pendiente de Verificación de Pago
                    </div>
                  </div>

                  <h4 className="font-black text-[11px] uppercase text-gray-400 tracking-widest mb-3 border-b border-gray-100 pb-2">Resumen de tu pedido</h4>
                  <div className="space-y-3 mb-6">
                    {/* USAMOS EL SNAPSHOT FINAL EN LUGAR DEL CARRITO VACÍO */}
                    {finalSnapshot.items.map((item, idx) => (
                      <div key={idx} className="flex justify-between text-sm">
                        <span className="font-medium text-gray-700">{item.quantity}x {item.product.nombre}</span>
                        <span className="font-bold text-gray-900">${(item.quantity * item.product.precio_mayor).toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
                  
                  <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl mb-8">
                    <span className="font-bold text-gray-600 uppercase text-xs">Total a pagar</span>
                    <span className="font-black text-2xl title-font" style={{ color: config.color_primario }}>${finalSnapshot.total.toFixed(2)} USD</span>
                  </div>

                  {config.datos_pago && (
                    <div className="p-5 border-2 border-dashed border-gray-200 rounded-2xl bg-gray-50 mb-6">
                      <h4 className="font-black text-xs uppercase tracking-widest text-gray-800 mb-3 flex items-center gap-2">💰 Instrucciones de Pago</h4>
                      <p className="text-xs text-gray-600 whitespace-pre-wrap leading-relaxed font-medium">{config.datos_pago}</p>
                    </div>
                  )}
                </div>

                {/* BOTONES DE ACCIÓN (Ocultos en la imagen) */}
                <div className="bg-white p-6 border-t border-gray-100 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-10 no-print space-y-3">
                  <a href={waLink} target="_blank" rel="noreferrer" className="w-full py-3.5 text-sm tracking-widest shadow-lg rounded-xl font-black title-font text-white flex items-center justify-center gap-2 hover:opacity-90 transition-opacity" style={{ backgroundColor: '#25D366' }}>
                    ENVIAR POR WHATSAPP
                  </a>
                  <div className="flex gap-3">
                    <Button onClick={downloadCheckoutTicket} className={`flex-1 py-3 text-xs transition-colors ${isDownloadingTicket ? 'bg-green-100 text-green-700 border-green-200 hover:bg-green-100' : ''}`} variant="secondary" disabled={isDownloadingTicket}>
                      {isDownloadingTicket ? <Check size={16} className="mr-2 inline"/> : <Download size={16} className="mr-2 inline"/>}
                      {isDownloadingTicket ? '¡Guardado!' : 'Guardar Ticket'}
                    </Button>
                    <Button onClick={onClose} className="flex-1 py-3 text-xs" variant="outlinePrimary" style={{ color: config.color_primario, borderColor: config.color_primario }}>Volver a la Tienda</Button>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="fixed inset-0 z-50 flex justify-end bg-gray-900/40 backdrop-blur-sm animate-in fade-in duration-300">
            <div className="w-full max-w-2xl bg-[#fafafa] h-full flex flex-col shadow-2xl animate-in slide-in-from-right-full duration-400">
              <div className="flex justify-between items-center px-8 py-5 text-white shadow-md z-10" style={{ backgroundColor: config.color_primario }}>
                <h2 className="text-2xl font-black uppercase tracking-widest title-font">Confirmar Pedido</h2>
                <button onClick={onClose} className="p-2 hover:bg-white/20 rounded-full transition-colors"><X size={24} /></button>
              </div>
              <div className="flex-grow overflow-y-auto p-6 md:p-8 hide-scrollbar">
                <div className="bg-white rounded-3xl border border-gray-100 mb-8 shadow-sm overflow-hidden">
                  <div className="px-6 py-4 border-b border-gray-100 bg-gray-50/50"><h3 className="font-black text-gray-800 text-sm tracking-widest title-font uppercase">Productos Añadidos ({cart.length})</h3></div>
                  <div className="p-6 space-y-6">
                    {cart.map(item => (
                      <div key={item.id} className="flex gap-5 items-center border-b border-gray-100 pb-6 last:border-0 last:pb-0">
                        <div className="w-20 h-20 bg-gray-50 rounded-2xl p-2 border border-gray-100 flex-shrink-0"><img src={item.product.fotos?.[0] || ''} alt="" className="w-full h-full object-contain mix-blend-multiply" /></div>
                        <div className="flex-grow">
                          <h4 className="font-bold text-sm text-gray-800 line-clamp-2 leading-tight mb-1">{item.product.nombre}</h4>
                          <p className="text-xs text-gray-500 font-semibold mb-2">Mín: {item.product.compra_minima_unidad}</p>
                          <button onClick={() => removeFromCart(item.id)} className="text-xs text-red-500 font-bold hover:underline flex items-center gap-1"><Trash2 size={12}/> Eliminar</button>
                        </div>
                        <div className="flex flex-col items-end gap-3">
                          <span className="font-black text-lg title-font text-gray-900">${(item.quantity * item.product.precio_mayor).toFixed(2)}</span>
                          <div className="flex items-center border-2 border-gray-100 rounded-xl">

                          </div>
                        </div>
                      </div>
                    ))}

                <div className="mb-8">
                  {!minMet ? (
                    <div className="bg-red-50 border border-red-100 rounded-2xl p-6 text-center shadow-inner">

                  ) : (
                    <div className="bg-green-50 border border-green-100 rounded-2xl p-5 text-center flex items-center justify-center gap-3 text-green-700 shadow-inner">

                      <span className="font-black title-font uppercase tracking-wide">¡Pedido mínimo alcanzado!</span>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                    <Input label="Nombre" name="firstName" value={form.firstName} onChange={handleChange} required />
                    <Input label="Apellido" name="lastName" value={form.lastName} onChange={handleChange} required />
                    <Input label="Teléfono / WA" name="phone" value={form.phone} onChange={handleChange} placeholder="+1 000 000 0000" required />
                    <Input label="Correo" type="email" name="email" value={form.email} onChange={handleChange} required />
                    <Input label="País" name="country" value={form.country} onChange={handleChange} required />
                    <Input label="Ciudad" name="city" value={form.city} onChange={handleChange} required />
                    <div className="md:col-span-2"><Input label="Dirección Completa" name="address" value={form.address} onChange={handleChange} required /></div>

              <div className="bg-white p-6 border-t border-gray-100 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-10">

                <Button onClick={handleCheckout} className="w-full py-4 text-base tracking-widest shadow-lg" style={{ backgroundColor: config.color_primario }} disabled={!minMet || checkoutStatus === 'submitting'}>
                  {checkoutStatus === 'submitting' ? 'PROCESANDO...' : 'GUARDAR PEDIDO Y ENVIAR WHATSAPP'}

              </div>
            </div>
          </div>
        );
      }

      // --- Sub-componente: Admin Pedidos ---
      function AdminPedidos({ pedidos, showMsg, config }) {
        const [expandedId, setExpandedId] = useState(null);
        // NUEVOS ESTADOS PARA BORRAR Y DESCARGAR
        const [orderToDelete, setOrderToDelete] = useState(null);
        const [deletePassword, setDeletePassword] = useState('');
        const [isDownloadingOrder, setIsDownloadingOrder] = useState(null);

        const updateStatus = async (id, newStatus) => {
          try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pedidos', id), { estado: newStatus }); showMsg('Estado del pedido actualizado'); } 
          catch (e) { showMsg('Error al actualizar', 'error'); }
        };

        // FUNCIÓN PARA ELIMINAR PEDIDO CON CONTRASEÑA
        const confirmDeleteOrder = async () => {
          if (deletePassword !== config.admin_password) {
            showMsg('Clave de administrador incorrecta', 'error');
            return;
          }
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pedidos', orderToDelete.id));
            showMsg('Pedido eliminado permanentemente');
          } catch (e) {
            showMsg('Error al eliminar', 'error');
          } finally {
            setOrderToDelete(null);
            setDeletePassword('');
          }
        };

        // FUNCIÓN PARA GENERAR TICKET DEL ADMIN
        const downloadOrderTicket = async (pedido) => {
          setIsDownloadingOrder(pedido.id);
          try {
            const element = document.getElementById(`admin-ticket-${pedido.id}`);
            const canvas = await window.html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `Orden_KiddieKolors_${pedido.id.slice(-6).toUpperCase()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
          } catch (e) {
            console.error("Error al generar la imagen", e);
            showMsg('Error al generar Ticket', 'error');
          } finally {
            setIsDownloadingOrder(null);
          }

        const getStatusColor = (status) => {
          switch(status) {
            case 'Pendiente': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
            case 'Procesado': return 'bg-blue-100 text-blue-800 border-blue-200';
            case 'Completado': return 'bg-green-100 text-green-800 border-green-200';

                  </p>
                  <Input label="Clave de Administrador" type="password" value={deletePassword} onChange={(e) => setDeletePassword(e.target.value)} placeholder="••••••••" className="mb-6" />
                  <div className="flex gap-3">
                    <Button onClick={() => {setOrderToDelete(null); setDeletePassword('');}} variant="secondary" className="flex-1 py-3 text-xs">Cancelar</Button>
                    <Button onClick={confirmDeleteOrder} variant="danger" className="flex-1 py-3 text-xs" disabled={!deletePassword}>Eliminar</Button>
                  </div>
                </div>
              </div>

            <div className="border-b border-gray-100 pb-4 mb-6"><h3 className="text-2xl font-black uppercase title-font tracking-wide">Gestión de Pedidos</h3><p className="text-sm text-gray-500 font-medium">Revisa las solicitudes de compra de tus clientes</p></div>
            {pedidos.length === 0 ? (
              <div className="text-center py-20 bg-gray-50 rounded-2xl border border-gray-100"><Package className="w-16 h-16 mx-auto mb-4 text-gray-300" /><p className="font-bold text-gray-500">Aún no hay pedidos registrados.</p></div>
            ) : (
              <div className="space-y-4">
                {pedidos.map(pedido => (
                  <div key={pedido.id} className="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all relative">
                    {/* TICKET DIGITAL OCULTO (Para que html2canvas lo dibuje y descargue sin molestar en la pantalla) */}
                    <div id={`admin-ticket-${pedido.id}`} className="absolute -left-[9999px] top-0 w-[500px] bg-white p-10">
                      <div className="text-center mb-6">
                        {config.logo_url && <img src={config.logo_url} alt="Logo" className="h-16 object-contain mb-4 mx-auto" />}
                        <h2 className="text-2xl font-black title-font uppercase text-gray-900 tracking-wide">RESUMEN DE PEDIDO</h2>
                        <p className="text-gray-500 font-bold text-sm mt-1">Nº #{pedido.id.slice(-6).toUpperCase()}</p>
                        <p className="text-gray-400 font-bold text-xs">{new Date(pedido.fecha).toLocaleString()}</p>
                      </div>
                      
                      <div className="border-t border-b border-gray-200 py-4 mb-6 text-gray-800">
                        <h4 className="font-black text-[11px] uppercase text-gray-400 tracking-widest mb-2">Datos del Cliente</h4>
                        <p className="text-base font-bold mb-1">{pedido.cliente?.firstName} {pedido.cliente?.lastName}</p>
                        <p className="text-sm mb-1">Tel: {pedido.cliente?.phone} | {pedido.cliente?.email}</p>
                        <p className="text-sm">Dir: {pedido.cliente?.address}, {pedido.cliente?.city}</p>
                        {pedido.cliente?.note && <p className="text-sm italic mt-2 text-gray-500 bg-gray-50 p-2 rounded-lg">" {pedido.cliente.note} "</p>}
                      </div>
                      
                      <h4 className="font-black text-[11px] uppercase text-gray-400 tracking-widest mb-3">Detalle de Artículos</h4>
                      <div className="space-y-3 mb-6 border-b border-gray-100 pb-6">
                        {pedido.items?.map((item, idx) => (
                          <div key={idx} className="flex justify-between text-sm items-center">
                            <span className="font-medium text-gray-700 w-2/3">{item.cantidad}x {item.nombre}</span>

                          </div>

                      </div>
                      
                      <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl">
                        <span className="font-bold text-gray-600 uppercase text-xs">Total del Pedido</span>
                        <span className="font-black text-2xl title-font" style={{ color: config.color_primario }}>${Number(pedido.total).toFixed(2)} USD</span>
                      </div>
                    </div>
                    {/* FIN DEL TICKET OCULTO */}

                    <div className="p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cursor-pointer hover:bg-gray-50" onClick={() => setExpandedId(expandedId === pedido.id ? null : pedido.id)}>
                      <div>
                        <div className="flex items-center gap-3 mb-1"><span className="font-black title-font text-lg">#{pedido.id.slice(-6).toUpperCase()}</span><span className={`text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-md border ${getStatusColor(pedido.estado)}`}>{pedido.estado}</span></div>
                        <div className="text-sm text-gray-600 font-medium">{pedido.cliente?.firstName} {pedido.cliente?.lastName} • {new Date(pedido.fecha).toLocaleDateString()}</div>

                      <div className="flex items-center gap-6 w-full md:w-auto justify-between md:justify-end">
                        <div className="text-right"><div className="font-black text-xl title-font text-gray-900">${Number(pedido.total).toFixed(2)}</div><div className="text-[11px] text-gray-500 uppercase font-bold tracking-wider">{pedido.items?.length || 0} ítems</div></div>

                          <div className="bg-white p-4 rounded-xl border border-gray-200 flex flex-col justify-center">
                            <h4 className="font-black text-[11px] uppercase text-gray-500 tracking-widest mb-3 border-b pb-2">Opciones del Pedido</h4>
                            <select value={pedido.estado} onChange={(e) => updateStatus(pedido.id, e.target.value)} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:outline-none text-sm font-bold text-gray-700 mb-3"><option value="Pendiente">Pendiente (Recién llegado)</option><option value="Procesado">Procesado (Armando/Empacando)</option><option value="Completado">Completado (Enviado/Pagado)</option><option value="Cancelado">Cancelado</option></select>
                            <a href={`https://wa.me/${pedido.cliente?.phone.replace(/\D/g,'')}`} target="_blank" rel="noreferrer" className="w-full text-center text-xs font-bold text-green-600 bg-green-50 py-2.5 rounded-lg hover:bg-green-100 transition-colors mb-2 block">Hablar por WhatsApp</a>
                            <div className="flex gap-2">

                                {isDownloadingOrder === pedido.id ? <Check size={14}/> : <Download size={14}/>} Ticket
                              </button>
                              <button onClick={() => setOrderToDelete(pedido)} className="flex-1 text-xs font-bold text-red-600 bg-white border border-red-200 py-2.5 rounded-lg hover:bg-red-50 transition-colors flex justify-center items-center gap-1">
                                <Trash2 size={14}/> Borrar
                              </button>

                          </div>

                              <div className="flex-grow"><p className="font-bold text-sm text-gray-800">{item.nombre}</p><p className="text-xs text-gray-500">${Number(item.precio).toFixed(2)} c/u</p></div>

                            </div>

                        </div>
                      </div>

                  </div>

              </div>

      // --- Sub-componente: Admin Apariencia ---
      function AdminApariencia({ config, showMsg }) {
        const [formData, setFormData] = useState(config);
        const [isUploading, setIsUploading] = useState(false);
        const [isLogoUploading, setIsLogoUploading] = useState(false);
        
        useEffect(() => { setFormData(config); }, [config]);

        const handleSave = async () => {
          try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), formData, { merge: true }); showMsg('Apariencia guardada correctamente'); } 
          catch (error) { showMsg('Error al guardar', 'error'); }
        };

        const handleFileUpload = async (e, field) => {
          const file = e.target.files[0]; if (!file) return;
          const setLoader = field === 'logo_url' ? setIsLogoUploading : setIsUploading;
          setLoader(true);
          try {
            const maxWidth = field === 'banner_url' ? 1200 : 400;
            const base64Url = await compressImage(file, maxWidth);
            setFormData({...formData, [field]: base64Url}); showMsg('Imagen procesada y subida con éxito');
          } catch (error) { showMsg('Error al procesar la imagen', 'error'); } finally { setLoader(false); }
        };

        return (
          <div className="space-y-8 animate-in fade-in">

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
              <div className="space-y-2">
                <Input label="Título Banner Superior" value={formData.mensaje_bienvenida} onChange={e => setFormData({...formData, mensaje_bienvenida: e.target.value})} />
                <Input label="Mínimo de Compra (USD)" type="number" min="0" value={formData.monto_minimo} onChange={e => setFormData({...formData, monto_minimo: Number(e.target.value)})} />

                </div>
              </div>
              <div className="space-y-6">
                <div className="bg-gray-50/50 p-5 rounded-2xl border border-gray-100">
                  <label className="flex justify-between items-end mb-3"><span className="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Logotipo (Fondo Transparente)</span><label className="text-blue-600 bg-blue-50 px-3 py-1 rounded-lg text-xs font-bold cursor-pointer hover:bg-blue-100 transition-colors">{isLogoUploading ? 'Subiendo...' : 'Subir Imagen'}<input type="file" className="hidden" accept="image/*" onChange={(e) => handleFileUpload(e, 'logo_url')} disabled={isLogoUploading}/></label></label>
